name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "API_AUTH_EMAIL=${{ secrets.API_AUTH_EMAIL }}" >> .env
          echo "API_AUTH_PASSWORD=${{ secrets.API_AUTH_PASSWORD }}" >> .env
          echo "API_URL=${{ secrets.API_URL }}" >> .env

      - name: Build
        run: npm run generate

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp server-static/package.json deploy/
          cp server-static/server.js deploy/
          cp -r .output/public deploy/public

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync with password
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            deploy/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET_DIR }}

      - name: Install dependencies on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.SSH_TARGET_DIR }} && npm install --production"
